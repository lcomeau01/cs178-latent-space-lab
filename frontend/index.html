<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StyleGAN2 Lab</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-container">
      <h1>StyleGAN2 Latent Space Lab: Click Either End Image to Randomize</h1>

      <div class="thumbs-section">
        <div id="interpMsg" class="msg"></div>
        <div class="interp-thumbs" id="interpResults" aria-live="polite"></div>
      </div>
        <div class="top-row">
        <div class="card" id="cardA">
            <div class="card-body">
            <img id="imgA" src="" alt="Image A" />
            </div>
        </div>

        <div class="card" id="cardB">
            <div class="card-body">
            <img id="imgB" src="" alt="Image B" />
            </div>
        </div>
          <div class="ops-and-interp-section">
            <div class="card result-card" id="cardOut">
                <div class="card-header">Show Specific Interpolation Amount</div>
                <div class="card-body">
                <img id="imgOut" src="" alt="Result" />
                </div>
                <div class="interp-controls">
                    <label for="weight">Interpolation Weight (w)</label>
                    <input id="weight" type="range" min="0" max="1" step="0.01" value="0.5"/>
                    <span id="weightVal">0.50</span>
                </div>
            </div>
            </div>
        <div class="ops-card">
            <div class="ops-grid">
            <div class="ops-section">
                <h3>Arithmetic</h3>
                <div class="ops-cols">
                    <div class="ops"> <img id="imgA-eq1"> + <img id="imgB-eq1"> = <img id="imgAddAB"> </div>
                    <div class="ops"> <img id="imgA-eq2"> - <img id="imgB-eq2"> = <img id="imgSubAB"> </div>
                    <div class="ops"> <img id="imgB-eq3"> - <img id="imgA-eq3"> = <img id="imgSubBA"> </div>
                </div>
            </div>
            </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
